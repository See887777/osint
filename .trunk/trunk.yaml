version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
lint:
  disabled:
    - yamllint
  enabled:
    - checkov@3.2.524
    - osv-scanner@2.3.5
    - trufflehog@3.95.2
    - actionlint@1.7.12
    - git-diff-check
    - gitleaks@8.30.1
    - markdownlint@0.48.0
    - oxipng@10.1.1
    - prettier@3.8.3
    - taplo@0.10.0
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
