<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon/favicon.ico" />
    <link
      type="text/css"
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/FortAwesome/Font-Awesome@6.x/css/all.min.css"
    />
    <link type="text/css" rel="stylesheet" href="/src/style.css" />
    <title>OSINT Framework</title>
  </head>

  <body>
    <div class="blob blob--1"></div>
    <div class="blob blob--2"></div>
    <div class="blob blob--3"></div>
    <div id="body"></div>
    <div id="tooltip" class="tooltip" style="opacity: 0"></div>

    <div class="legend">
      <table width="100%" border="0">
        <tr>
          <td align="center">(D)</td>
          <td>
            <i class="fab fa-google" style="color: var(--accent-2)"></i>
            &nbsp; Google Dork, for more information:
            <a
              href="https://en.wikipedia.org/wiki/Google_hacking"
              target="_blank"
              >Google Hacking</a
            >
          </td>
        </tr>
        <tr>
          <td align="center">(R)</td>
          <td>
            <i class="fas fa-users" style="color: var(--accent-2)"></i>
            &nbsp; Requires registration
          </td>
        </tr>
        <tr>
          <td align="center">(M)</td>
          <td>
            <i class="fas fa-link" style="color: var(--accent-2)"></i>
            &nbsp; Provides URL with a search query
          </td>
        </tr>
        <tr>
          <td align="center">(T)</td>
          <td>
            <i class="fas fa-tools" style="color: var(--accent-2)"></i>
            &nbsp; The tool has to be set up on a local device
          </td>
        </tr>
      </table>
    </div>

    <div class="btn-group">
      <button id="legend-btn" class="pill-btn">Legend</button>
      <button id="mode-btn" class="pill-btn">Focus</button>
    </div>

    <svg width="0" height="0" style="position: absolute">
      <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="mist-dissolve" x="-50%" y="-50%" width="200%" height="200%">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0"
          numOctaves="2"
          result="noise"
          id="mist-turb"
        />
        <feDisplacementMap
          in="SourceGraphic"
          in2="noise"
          scale="0"
          xChannelSelector="R"
          yChannelSelector="G"
          id="mist-disp"
        />
      </filter>
    </svg>

    <div id="intro-layer">
      <svg id="lock-icon" viewBox="0 0 100 100" width="150" height="150">
        <circle
          cx="50"
          cy="50"
          r="40"
          stroke="var(--accent-2)"
          stroke-width="2"
          fill="none"
          class="lock-ring"
        />
        <rect
          x="35"
          y="40"
          width="30"
          height="30"
          rx="3"
          fill="var(--accent)"
        />
        <path
          d="M 40 40 V 30 A 10 10 0 0 1 60 30 V 40"
          fill="none"
          stroke="var(--accent)"
          stroke-width="4"
        />
      </svg>
      <div class="intro-text">INITIATING DISCOVERY</div>
    </div>

    <div class="controls-overlay" style="display: none">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Search nodes..." />
      </div>
      <button id="reset-btn" class="pill-btn">
        <i class="fas fa-crosshairs"></i> Center
      </button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
